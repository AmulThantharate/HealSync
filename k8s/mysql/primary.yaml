---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-primary-pvc
  namespace: healsync
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-primary-config
  namespace: healsync
data:
  primary.cnf: |
    [mysqld]
    server-id                = 1
    log-bin                  = mysql-bin
    binlog-format            = ROW
    binlog-row-image         = FULL
    expire-logs-days         = 7
    gtid-mode                = ON
    enforce-gtid-consistency = ON
    character-set-server     = utf8mb4
    collation-server         = utf8mb4_unicode_ci
    max-connections          = 500
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-primary
  namespace: healsync
  labels:
    app: mysql-primary
    role: primary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-primary
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql-primary
        role: primary
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: role
                    operator: In
                    values: ["primary", "secondary"]
              topologyKey: kubernetes.io/hostname
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: healsync
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-primary-pvc
        - name: config
          configMap:
            name: mysql-primary-config
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-primary
  namespace: healsync
spec:
  selector:
    app: mysql-primary
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
